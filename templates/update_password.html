{% extends "base.html" %}
{% block content %}
<div class="card" style="margin-top:20px; padding:24px; max-width:760px;">
  <h2 style="margin:0; color:#0f2d5c;">Update / Reset Password</h2>
  <p style="margin:8px 0 0; color:#274472;">Change your password securely from inside your account.</p>

  {% if page_error %}
  <div class="auth-message auth-error" style="margin-top:14px;">{{ page_error }}</div>
  {% endif %}
  {% if page_success %}
  <div class="auth-message auth-success" style="margin-top:14px;">{{ page_success }}</div>
  {% endif %}

  <form method="POST" action="/update-password" style="margin-top:18px; display:grid; gap:14px;">
    <label style="display:grid; gap:8px; color:#274472; font-weight:800;">
      Current Password
      <input type="password" name="current_password" required style="padding:13px; border:1px solid #d9ecff; border-radius:12px;">
    </label>
    <label style="display:grid; gap:8px; color:#274472; font-weight:800;">
      New Password
      <input type="password" name="new_password" required style="padding:13px; border:1px solid #d9ecff; border-radius:12px;">
    </label>
    <label style="display:grid; gap:8px; color:#274472; font-weight:800;">
      Confirm New Password
      <input type="password" name="confirm_password" required style="padding:13px; border:1px solid #d9ecff; border-radius:12px;">
    </label>
    <p style="margin:0; color:#56729d;">{{ password_rule_text }}</p>
    <button type="submit" class="read-more-btn" style="border:none; cursor:pointer; width:max-content;">Update Password</button>
  </form>
</div>
{% endblock %}
