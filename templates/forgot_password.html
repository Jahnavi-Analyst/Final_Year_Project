{% extends "auth_base.html" %}

{% block title %}Forgot Password | InformaX AI{% endblock %}

{% block auth_content %}
<div class="auth-head">
  <h2>Forgot Password</h2>
  <p>get an OTP on your registered email</p>
  <span class="auth-head-line"></span>
</div>

{% if page_error %}
  <div class="auth-message auth-error">{{ page_error }}</div>
{% endif %}

<form method="POST" action="/forgot-password" class="auth-form" autocomplete="off">
  <label class="auth-field">
    <i class="fa-regular fa-envelope"></i>
    <input type="email" name="email" placeholder="Registered Email" value="{{ prefill_email }}" autocomplete="off" autocapitalize="off" spellcheck="false" required>
  </label>

  <button type="submit" class="auth-submit">
    <span>Send OTP</span>
    <i class="fa-solid fa-arrow-right"></i>
  </button>
</form>

<p class="auth-footer-text">
  Back to your account?
  <a href="/login" class="auth-link strong-link">Back to Login</a>
</p>
{% endblock %}
