{% extends "auth_base.html" %}

{% block title %}Login | InformaX AI{% endblock %}

{% block auth_content %}
<div class="auth-head">
  <h2>Login</h2>
  <p>to your account</p>
  <span class="auth-head-line"></span>
</div>

{% if page_error %}
  <div class="auth-message auth-error">{{ page_error }}</div>
{% endif %}
{% if page_success %}
  <div class="auth-message auth-success">{{ page_success }}</div>
{% endif %}

<form method="POST" action="/login" class="auth-form" autocomplete="on">
  <label class="auth-field">
    <i class="fa-regular fa-envelope"></i>
    <input type="email" name="email" placeholder="Email Address" value="{{ prefill_email }}" autocomplete="email" autocapitalize="off" spellcheck="false" required>
  </label>

  <label class="auth-field">
    <i class="fa-solid fa-lock"></i>
    <input type="password" id="loginPassword" name="password" placeholder="Password" autocomplete="current-password" required>
    <button type="button" class="password-toggle" data-toggle-password="loginPassword">
      <i class="fa-regular fa-eye"></i>
    </button>
  </label>

  <div class="auth-row">
    <label class="remember-check">
      <input type="checkbox" name="remember_me" {% if remember_checked %}checked{% endif %}>
      <span>Remember Me</span>
    </label>
    <a href="/forgot-password" class="auth-link">Forgot Password?</a>
  </div>

  <button type="submit" class="auth-submit">
    <span>Login</span>
    <i class="fa-solid fa-arrow-right"></i>
  </button>
</form>

<p class="auth-footer-text">
  Don't have an account?
  <a href="/signup" class="auth-link strong-link">Sign Up</a>
</p>
{% endblock %}
